<div class="container">

    <button class="btn btn-icon" id="prevBtn" onclick="prevWord()" title="이전 단어">⬅</button>
    <button class="btn btn-main" id="playBtn" onclick="togglePlay()">▶ 시작</button>
    <button class="btn btn-icon" id="nextBtn" onclick="nextWord()" title="다음 단어">➡</button>
  </div>
  <div class="speed-controls">
    <button class="speed-btn" data-sec="3" onclick="setInterval_(3)">3초</button>
    <button class="speed-btn active" data-sec="5" onclick="setInterval_(5)">5초</button>
    <button class="speed-btn" data-sec="8" onclick="setInterval_(8)">8초</button>

    <input type="checkbox" id="hideMeaningCheck" onchange="onHideMeaningToggle(this.checked)">
    <label for="hideMeaningCheck">단어 뜻 가리기 (다음 단어 1초 전 표시)</label>
  </div>

  <button class="sheet-link-btn" onclick="openSheet()">📊 스프레드시트로 바로 가기</button>

<script>
const SHEET_ID = '1THexNEpg2h7CnceWDumdRNYziQzq3B9ptwzKLFO7hvQ';

let words = [];
let usedIndices = [];
let history = [];      // 재생된 word index 기록 (이전 단어 이동용)
let historyPos = -1;   // history 내 현재 위치
let nextIdx = null;    // 미리 정해둔 다음 단어 index
let isPlaying = false;
let timer = null;
let progressTimer = null;
let revealTimer = null;
let progressVal = 0;
let INTERVAL = 5000;
let currentVolume = 0.3;
let hideMeaning = false;

function setVolume(val) {
  currentVolume = val / 100;
}

function onHideMeaningToggle(checked) {
  hideMeaning = checked;
  const el = document.querySelector('.meaning');
  if (!el) return;
  if (hideMeaning) {
    el.classList.add('hidden-meaning');
  } else {
    el.classList.remove('hidden-meaning');
  }
}

function openSheet() {
  window.open(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`, '_blank');
}

function setInterval_(sec) {
  INTERVAL = sec * 1000;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.speed-btn[data-sec="${sec}"]`).classList.add('active');
  if (isPlaying) {
    clearTimeout(timer);
    clearInterval(progressTimer);
    startAutoPlay();
  }
}

// ===== 구글 시트 로드 (JSONP) =====
window.handleSheetData = function(data) {
  try {
    const allRows = data.table.rows;
    if (!allRows || allRows.length === 0) throw new Error('데이터 행이 없어요.');

    const headerRow = allRows[0].c;
    const cols = headerRow.map(c => String(c?.v ?? '').trim().toLowerCase());
    const dataRows = allRows.slice(1);

    const findCol = (key) => cols.findIndex(c => c.includes(key));
    const colMap = {
      spelling: findCol('스펠링') >= 0 ? findCol('스펠링') : findCol('spelling'),
      pos: findCol('품사'),
      meaning: findCol('뜻'),
      ipa: findCol('ipa'),
      krPron: findCol('한국어 발음') >= 0 ? findCol('한국어 발음') : findCol('발음')
    };

    if (colMap.spelling < 0) throw new Error('스펠링 컬럼을 찾을 수 없어요. 컬럼: ' + cols.join(', '));

    words = dataRows.map(r => {
      const get = (idx) => idx >= 0 ? (r.c[idx]?.v ?? '') : '';
      return {
        spelling: String(get(colMap.spelling)).trim(),
        pos: String(get(colMap.pos)).trim(),
        meaning: String(get(colMap.meaning)).trim(),
        ipa: String(get(colMap.ipa)).trim(),
        krPron: String(get(colMap.krPron)).trim(),
      };
    }).filter(w => w.spelling);

    if (words.length === 0) throw new Error('단어 데이터가 없어요.');

    document.getElementById('status').textContent = `✅ ${words.length}개 단어 로드 완료`;
    document.getElementById('counter').textContent = `총 ${words.length}개 단어`;

    // 첫 단어 표시 + 다음 단어 프리로딩
    const firstIdx = getRandomIndex();
    showWord(firstIdx, true);
  } catch(e) {
    showLoadError(e.message);
  }
};

function loadSheet() {
  const script = document.createElement('script');
  script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:handleSheetData&gid=0`;
  script.onerror = () => showLoadError('스크립트 로드 실패 (네트워크 또는 권한 문제)');
  document.body.appendChild(script);

  setTimeout(() => {
    if (words.length === 0 && !document.getElementById('status').textContent.includes('✅')) {
      showLoadError('응답 없음 (10초 초과)');
    }
  }, 10000);
}

function showLoadError(msg) {
  document.getElementById('status').innerHTML = `<span class="error">❌ 불러오기 실패</span>`;
  document.getElementById('card').innerHTML = `
    <div class="error" style="text-align:left; font-size:13px; line-height:1.8;">
      <b>스프레드시트를 불러올 수 없어요.</b><br><br>
      오류: ${msg}<br><br>
      <small>
      확인할 사항:<br>
      1. 공유 설정 → "링크가 있는 모든 사용자" → <b>뷰어</b><br>
      2. 단어 데이터가 <b>첫 번째 시트(탭)</b>에 있는지<br>
      3. 헤더 행에 "스펠링", "품사", "뜻", "IPA", "한국어 발음" 컬럼명이 있는지
      </small>
    </div>`;
}

// ===== 단어 선택 =====
function getRandomIndex() {
  if (usedIndices.length >= words.length) usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * words.length); }
  while (usedIndices.includes(idx) && words.length > 1);
  usedIndices.push(idx);
  return idx;
}

// ===== 오디오 프리로딩 =====
// preloadCache: word -> Promise<{type:'dict'|'gtts', audioEl}>
const preloadCache = {};

function fetchWithTimeout(url, ms) {
  const controller = new AbortController();
  const t = setTimeout(() => controller.abort(), ms);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(t));
}

// Google TTS 프록시 (Cloudflare Workers - Origin 제약 우회)
function getGoogleTTSUrl(word) {
  return `https://toeicvoka.dororoko.workers.dev/?q=${encodeURIComponent(word)}&tl=en`;
}

function testAudioLoadable(url, ms) {
  return new Promise((resolve) => {
    const audio = new Audio();
    let done = false;
    const finish = (ok) => { if (!done) { done = true; resolve(ok ? audio : null); } };
    const timer = setTimeout(() => finish(false), ms);
    audio.oncanplaythrough = () => { clearTimeout(timer); finish(true); };
    audio.onerror = () => { clearTimeout(timer); finish(false); };
    audio.preload = 'auto';
    audio.src = url;
    audio.load();
  });
}

function preloadWord(word) {
  if (preloadCache[word]) return preloadCache[word];
  preloadCache[word] = (async () => {
    // 1순위: Dictionary API 원어민 음성
    try {
      const res = await fetchWithTimeout(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`, 2500);
      const data = await res.json();
      const phonetics = data[0]?.phonetics || [];
      const audioUrl = phonetics.find(p => p.audio)?.audio || null;
      if (audioUrl) {
        const audioEl = new Audio();
        audioEl.preload = 'auto';
        audioEl.src = audioUrl;
        audioEl.load();
        return { type: 'dict', audioEl };
      }
    } catch (e) { /* 다음 단계로 */ }

    // 2순위: Google TTS (비공식, 실패 가능성 있어 사전 로드 테스트)
    const gAudio = await testAudioLoadable(getGoogleTTSUrl(word), 1800);
    if (gAudio) {
      return { type: 'gtts', audioEl: gAudio };
    }

    // 3순위: 브라우저 내장 TTS
    return { type: 'tts', audioEl: null };
  })();
  return preloadCache[word];
}

// ===== 음성 재생 (브라우저 내장 TTS 최적화) =====
let cachedVoices = [];

function refreshVoices() {
  cachedVoices = window.speechSynthesis.getVoices();
}
if ('speechSynthesis' in window) {
  refreshVoices();
  window.speechSynthesis.onvoiceschanged = refreshVoices;
}

function getBestVoice() {
  const voices = cachedVoices.length ? cachedVoices : window.speechSynthesis.getVoices();
  // 우선순위: 고품질 온라인/Natural 음성 > 로컬 en-US > 기타 영어
  const priorityNames = ['Google US English', 'Microsoft Aria Online', 'Microsoft Jenny Online', 'Samantha', 'Microsoft Zira Online'];
  for (const name of priorityNames) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  return voices.find(v => v.lang === 'en-US' && /natural|online|neural/i.test(v.name))
    || voices.find(v => v.lang === 'en-US' && !v.localService)
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
}

function setSourceLabel(text) {
  const el = document.getElementById('audioSource');
  if (el) el.textContent = text;
}

function playBrowserTTS(word, icon) {
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = 0.92;
    utter.pitch = 1.0;
    utter.volume = currentVolume;
    const voice = getBestVoice();
    if (voice) { utter.voice = voice; utter.lang = voice.lang; }
    utter.onend = () => { if (icon) icon.classList.remove('playing'); };
    utter.onerror = () => { if (icon) icon.classList.remove('playing'); };
    // 일부 브라우저(Chrome)는 cancel 직후 speak가 씹히는 버그가 있어 약간의 지연
    setTimeout(() => window.speechSynthesis.speak(utter), 30);
    setSourceLabel('브라우저 내장 TTS 사용' + (voice ? ` (${voice.name})` : ''));
  } catch {
    if (icon) icon.classList.remove('playing');
  }
}

async function playWord(word) {
  const icon = document.getElementById('audioIcon');
  if (icon) icon.classList.add('playing');
  setSourceLabel('⏳ 음성 준비 중...');

  let entry;
  try {
    entry = await preloadWord(word);
  } catch {
    playBrowserTTS(word, icon);
    return;
  }

  if (entry.type === 'tts' || !entry.audioEl) {
    playBrowserTTS(word, icon);
    return;
  }

  const audioEl = entry.audioEl;
  audioEl.volume = currentVolume;
  try { audioEl.currentTime = 0; } catch {}

  const label = entry.type === 'dict' ? 'Dictionary API 원어민 음성 사용' : 'Google Translate TTS 사용';

  audioEl.onended = () => { if (icon) icon.classList.remove('playing'); };
  audioEl.onerror = () => {
    if (icon) icon.classList.remove('playing');
    playBrowserTTS(word, icon);
  };

  audioEl.play()
    .then(() => setSourceLabel(label))
    .catch(() => playBrowserTTS(word, icon));
}

// ===== 영단어 글씨 크기 자동 조절 =====
// 길이에 따라 단계적으로 글씨 크기를 줄여 줄바꿈/잘림을 방지
const SPELLING_SIZE_STEPS = [64, 52, 42, 34, 28, 22, 18];

function adjustSpellingSize() {
  const el = document.querySelector('.spelling');
  const card = document.getElementById('card');
  if (!el || !card) return;

  const available = card.clientWidth - 80; // 카드 좌우 패딩 고려
  let stepIdx = 0;
  el.style.fontSize = SPELLING_SIZE_STEPS[stepIdx] + 'px';

  // 강제 리플로우 후 측정, 닿으면 다음 단계로 축소
  while (el.scrollWidth > available && stepIdx < SPELLING_SIZE_STEPS.length - 1) {
    stepIdx++;
    el.style.fontSize = SPELLING_SIZE_STEPS[stepIdx] + 'px';
  }

  // 그래도 넘치면 줄바꿈 허용 (최후의 수단)
  if (el.scrollWidth > available) {
    el.style.whiteSpace = 'normal';
  } else {
    el.style.whiteSpace = 'nowrap';
  }
}

window.addEventListener('resize', adjustSpellingSize);
function renderWordInfo(w) {
  document.getElementById('card').innerHTML = `
    <div class="pos-badge">${w.pos || '—'}</div>
    <div class="word-number">#${historyPos + 1} / ${words.length}</div>
    <div class="audio-icon" id="audioIcon">🔊</div>
    <div class="spelling">${w.spelling}</div>
    ${w.ipa ? `<div class="ipa">${w.ipa}</div>` : ''}
    ${w.krPron ? `<div class="kr-pronunciation">[ ${w.krPron} ]</div>` : ''}
    ${w.meaning ? `<div class="meaning${hideMeaning ? ' hidden-meaning' : ''}">${w.meaning}</div>` : ''}
    <div class="audio-source" id="audioSource"></div>
  `;
  adjustSpellingSize();
}

// idx: 표시할 단어의 인덱스. isInitial: 최초 호출 여부
function showWord(idx, isInitial) {
  // 히스토리 관리
  if (isInitial) {
    history = [idx];
    historyPos = 0;
  } else {
    // 새로운 단어로 진행 -> 현재 위치 이후 기록 제거하고 추가
    history = history.slice(0, historyPos + 1);
    history.push(idx);
    historyPos = history.length - 1;
  }

  renderWordInfo(words[idx]);
  playWord(words[idx].spelling);

  // 다음에 보여줄 랜덤 단어를 미리 정하고 프리로딩
  nextIdx = getRandomIndex();
  preloadWord(words[nextIdx].spelling);
}

function startProgress() {
  clearInterval(progressTimer);
  clearTimeout(revealTimer);
  progressVal = 0;
  document.getElementById('progress').style.width = '0%';
  progressTimer = setInterval(() => {
    progressVal += 100 / (INTERVAL / 100);
    if (progressVal >= 100) progressVal = 100;
    document.getElementById('progress').style.width = progressVal + '%';
  }, 100);

  // 다음 단어로 넘어가기 1초 전, 뜻 다시 보이기
  if (hideMeaning) {
    const revealDelay = Math.max(INTERVAL - 1000, 0);
    revealTimer = setTimeout(() => {
      const el = document.querySelector('.meaning');
      if (el) el.classList.remove('hidden-meaning');
    }, revealDelay);
  }
}

function togglePlay() {
  if (words.length === 0) return;
  isPlaying = !isPlaying;
  const btn = document.getElementById('playBtn');
  if (isPlaying) {
    btn.textContent = '⏸ 일시정지';
    startAutoPlay();
  } else {
    btn.textContent = '▶ 재생';
    clearTimeout(timer);
    clearInterval(progressTimer);
    clearTimeout(revealTimer);
  }
}

function startAutoPlay() {
  startProgress();
  timer = setTimeout(() => {
    if (!isPlaying) return;
    goToNext();
    startAutoPlay();
  }, INTERVAL);
}

// 미리 정해둔(프리로딩된) 다음 단어로 이동
function goToNext() {
  clearTimeout(timer);
  clearInterval(progressTimer);
  clearTimeout(revealTimer);
  if (nextIdx === null) nextIdx = getRandomIndex();
  showWord(nextIdx, false);
}

function nextWord() {
  // 사용자가 수동으로 다음 단어 요청 (앞으로 진행한 기록이 있으면 그것을 사용)
  if (historyPos < history.length - 1) {
    clearTimeout(timer);
    clearInterval(progressTimer);
    clearTimeout(revealTimer);
    historyPos++;
    const idx = history[historyPos];
    renderWordInfo(words[idx]);
    playWord(words[idx].spelling);
  } else {
    goToNext();
  }
  if (isPlaying) startAutoPlay();
}

function prevWord() {
  if (historyPos <= 0) return;
  clearTimeout(timer);
  clearInterval(progressTimer);
  clearTimeout(revealTimer);
  historyPos--;
  const idx = history[historyPos];
  renderWordInfo(words[idx]);
  playWord(words[idx].spelling);
  if (isPlaying) startAutoPlay();
}

loadSheet();
</script>
</body>
</html>
